services:
  # RAG Microservice
  - type: web
    name: rag-service
    env: python
    region: oregon
    rootDir: rag
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

  # Backend
  - type: web
    name: backend-service
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false # User will set this in Render dashboard
      - key: RAG_SERVICE_URL
        fromService:
          type: web
          name: rag-service
          property: host

  # Frontend (Static Site)
  - type: web
    name: frontend-service
    env: static
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        sync: false # User will set this to the backend URL in Render dashboard

